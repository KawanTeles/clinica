<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal do Cliente | Clínica Zoe</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/darkmode.css">
  <script src="../../js/theme.js"></script>
  <style>
    body {
      background: var(--bg-body);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Inter', sans-serif;
    }
    .login-box {
      background: var(--bg-card);
      padding: 3rem;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      border: 1px solid var(--border-color);
      max-width: 400px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .logo {
      font-size: 2rem;
      color: var(--primary-color);
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>

  <div class="login-box" id="login-container">
    <div class="logo"><i class="fas fa-hand-holding-heart"></i></div>
    <h2 style="color: var(--text-dark); margin-bottom: 0.5rem;">Clínica Zoe</h2>
    <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem;" id="login-message">Verificando seu acesso seguro...</p>
    
    <div id="loader">
      <i class="fas fa-spinner fa-spin fa-2x" style="color: var(--primary-color);"></i>
    </div>
  </div>

  <script type="module">
    import { PortalService } from '../../js/services/portal.service.js';

    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const messageEl = document.getElementById('login-message');
      const loader = document.getElementById('loader');

      if (!token) {
        messageEl.textContent = 'Acesso inválido. Por favor, utilize o link enviado no seu WhatsApp ou E-mail.';
        messageEl.style.color = 'var(--danger-color)';
        loader.style.display = 'none';
        return;
      }

      try {
        const session = await PortalService.authenticateWithToken(token);
        if (session) {
          messageEl.textContent = 'Acesso confirmado! Redirecionando...';
          messageEl.style.color = 'var(--success-color)';
          setTimeout(() => {
            window.location.href = './dashboard.html';
          }, 1000);
        } else {
          throw new Error('Token expirado ou inválido.');
        }
      } catch (error) {
        messageEl.textContent = error.message || 'Erro ao validar acesso. Solicite um novo link.';
        messageEl.style.color = 'var(--danger-color)';
        loader.style.display = 'none';
      }
    });
  </script>
</body>
</html>
