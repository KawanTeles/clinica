<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financeiro | Admin Clínica Zoe</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../../css/admin/admin.css">
  <link rel="stylesheet" href="../../css/admin/components.css">
  <link rel="stylesheet" href="../../css/admin/responsive-admin.css">

  <!-- Supabase CDN & Auth Guard -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="../../js/theme.js"></script>
  <script type="module" src="../../js/admin/guard.js"></script>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="admin-sidebar">
      <div class="admin-sidebar-header">
        <a href="dashboard.html" class="admin-brand"><i class="fas fa-hand-holding-heart"></i><span>Zoe Admin</span></a>
      </div>
      <nav class="admin-sidebar-nav">
        <a href="dashboard.html" class="admin-nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
        <a href="profissionais.html" class="admin-nav-item"><i class="fas fa-user-md"></i><span>Profissionais</span></a>
        <a href="pacientes.html" class="admin-nav-item"><i class="fas fa-users"></i><span>Pacientes</span></a>
        <a href="agenda.html" class="admin-nav-item"><i class="far fa-calendar-alt"></i><span>Agenda</span></a>
        <a href="financeiro.html" class="admin-nav-item active"><i class="fas fa-wallet"></i><span>Financeiro</span></a>
        <a href="usuarios.html" class="admin-nav-item"><i class="fas fa-user-shield"></i><span>Usuários</span></a>
        <a href="configuracoes.html" class="admin-nav-item">
          <i class="fas fa-cog"></i>
          <span>Configurações</span>
        </a>
        <hr style="border: 0; border-top: 1px solid var(--admin-border-color); margin: 8px 0;" />
        <a href="../../index.html" class="admin-nav-item">
          <i class="fas fa-external-link-alt"></i>
          <span>Voltar ao Site</span>
        </a>
        <a href="#" class="admin-nav-item" id="btn-logout" style="color: var(--admin-danger);">
          <i class="fas fa-sign-out-alt"></i>
          <span>Sair</span>
        </a>
      </nav>
      <div class="admin-sidebar-footer">
        <div class="clinic-tenant-info">
          <div class="tenant-logo">CZ</div>
          <div class="tenant-details"><span class="tenant-name">Clínica Zoe - Matriz</span><span class="tenant-plan">Plano Premium</span></div>
        </div>
      </div>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <div class="header-left">
          <button class="mobile-menu-btn" id="mobile-menu-btn"><i class="fas fa-bars"></i></button>
          <h1 class="page-title">Controle Financeiro</h1>
        </div>
        <div class="header-right">
          <div class="header-alerts"><i class="fas fa-bell"></i><span class="alert-badge">3</span></div>
          <div class="user-profile">
            <img src="https://ui-avatars.com/api/?name=Admin+Zoe&background=3498db&color=fff" alt="Avatar" class="user-avatar">
            <div class="user-info"><span class="user-name">Administrador</span><span class="user-role">Acesso Total</span></div>
          </div>
        </div>
      </header>

      <div class="admin-content">
        <div class="admin-card">
          <div class="card-header">
            <h2 class="card-title">Visão Geral Financeira</h2>
            <button class="admin-btn admin-btn-primary"><i class="fas fa-plus"></i> Nova Transação</button>
          </div>
          <p style="color: var(--admin-text-muted);">O módulo financeiro será implementado na ETAPA 7.</p>
        </div>
      </div>
    </main>
  </div>
  <script src="../../js/admin/admin.js"></script>
  <script src="../../js/admin/sidebar.js"></script>
</body>
</html>
