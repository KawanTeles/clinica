<div class="module-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
  <div>
    <h2 style="margin: 0; font-size: 1.5rem;">Marketing & Relacionamento</h2>
    <p style="color: var(--text-muted); margin: 0.5rem 0 0 0; font-size: 0.95rem;">Campanhas segmentadas para pacientes e leads.</p>
  </div>
  
  <div>
    <button class="btn btn-primary" id="btn-nova-campanha" style="padding: 0.75rem 1.5rem; border-radius: 10px; background: var(--primary-color); color: white; border: none; font-weight: 500; cursor: pointer;">
      <i class="fas fa-bullhorn"></i> Nova Campanha
    </button>
  </div>
</div>

<div class="dashboard-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">
  <div class="glass-card" style="padding: 1.5rem; border-radius: 12px; background: var(--bg-card); border: 1px solid var(--border-color);">
    <div style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.5rem;"><i class="fas fa-paper-plane"></i> Campanhas Ativas</div>
    <div style="font-size: 1.5rem; font-weight: 700; color: var(--text-dark);" id="kpi-campanhas">--</div>
  </div>
  <div class="glass-card" style="padding: 1.5rem; border-radius: 12px; background: var(--bg-card); border: 1px solid var(--border-color);">
    <div style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.5rem;"><i class="fas fa-check-double"></i> Taxa de Entrega</div>
    <div style="font-size: 1.5rem; font-weight: 700; color: var(--success-color);">98.5%</div>
  </div>
</div>

<div class="glass-card" style="background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden;">
  <div style="padding: 1rem 1.5rem; border-bottom: 1px solid var(--border-color);">
    <h3 style="margin: 0; font-size: 1.1rem;">Histórico de Campanhas</h3>
  </div>
  <table style="width: 100%; border-collapse: collapse; text-align: left;">
    <thead>
      <tr style="background: var(--bg-input); color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase;">
        <th style="padding: 1rem 1.5rem; font-weight: 600;">Campanha</th>
        <th style="padding: 1rem 1.5rem; font-weight: 600;">Objetivo</th>
        <th style="padding: 1rem 1.5rem; font-weight: 600;">Status</th>
        <th style="padding: 1rem 1.5rem; font-weight: 600;">Disparos</th>
        <th style="padding: 1rem 1.5rem; font-weight: 600;">Data</th>
      </tr>
    </thead>
    <tbody id="marketing-list">
      <tr><td colspan="5" style="text-align:center; padding: 2rem; color: var(--text-muted);">Carregando...</td></tr>
    </tbody>
  </table>
</div>
