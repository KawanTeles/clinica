<div class="module-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
  <div>
    <h2 style="margin: 0; font-size: 1.5rem;">Funil Comercial (Leads)</h2>
    <p style="color: var(--text-muted); margin: 0.5rem 0 0 0; font-size: 0.95rem;">Arraste os cards para alterar o status. Leads convertidos tornam-se pacientes.</p>
  </div>
  
  <div>
    <button class="btn btn-primary" id="btn-novo-lead" style="padding: 0.75rem 1.5rem; border-radius: 10px; background: var(--primary-color); color: white; border: none; font-weight: 500; cursor: pointer;">
      <i class="fas fa-plus"></i> Novo Lead
    </button>
  </div>
</div>

<div class="kanban-board" style="display: flex; gap: 1.5rem; overflow-x: auto; padding-bottom: 1rem; min-height: 70vh; align-items: flex-start;">
  
  <!-- Colunas -->
  <div class="kanban-col" data-status="Novo Lead" style="background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; min-width: 300px; padding: 1rem;">
    <h4 style="margin-top: 0; border-bottom: 2px solid var(--primary-color); padding-bottom: 0.5rem;">Novo Lead</h4>
    <div class="kanban-cards-container" style="min-height: 500px; display: flex; flex-direction: column; gap: 1rem;" id="col-novo-lead"></div>
  </div>

  <div class="kanban-col" data-status="Primeiro Contato" style="background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; min-width: 300px; padding: 1rem;">
    <h4 style="margin-top: 0; border-bottom: 2px solid #5ac8fa; padding-bottom: 0.5rem;">Primeiro Contato</h4>
    <div class="kanban-cards-container" style="min-height: 500px; display: flex; flex-direction: column; gap: 1rem;" id="col-primeiro-contato"></div>
  </div>

  <div class="kanban-col" data-status="Em Negociação" style="background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; min-width: 300px; padding: 1rem;">
    <h4 style="margin-top: 0; border-bottom: 2px solid #ffcc00; padding-bottom: 0.5rem;">Em Negociação</h4>
    <div class="kanban-cards-container" style="min-height: 500px; display: flex; flex-direction: column; gap: 1rem;" id="col-negociacao"></div>
  </div>

  <div class="kanban-col" data-status="Agendamento Solicitado" style="background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; min-width: 300px; padding: 1rem;">
    <h4 style="margin-top: 0; border-bottom: 2px solid #ff9500; padding-bottom: 0.5rem;">Agend. Solicitado</h4>
    <div class="kanban-cards-container" style="min-height: 500px; display: flex; flex-direction: column; gap: 1rem;" id="col-agendamento"></div>
  </div>

  <div class="kanban-col" data-status="Convertido" style="background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; min-width: 300px; padding: 1rem; opacity: 0.8;">
    <h4 style="margin-top: 0; border-bottom: 2px solid var(--success-color); padding-bottom: 0.5rem;"><i class="fas fa-check"></i> Convertido</h4>
    <div class="kanban-cards-container" style="min-height: 500px; display: flex; flex-direction: column; gap: 1rem;" id="col-convertido"></div>
  </div>

</div>

<style>
  .kanban-card {
    background: var(--bg-body);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 1rem;
    cursor: grab;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .kanban-card:active {
    cursor: grabbing;
    transform: scale(0.98);
  }
  .kanban-card h5 { margin: 0 0 0.5rem 0; font-size: 1rem; color: var(--text-dark); }
  .kanban-card p { margin: 0; font-size: 0.8rem; color: var(--text-muted); }
  .drag-over { background: rgba(0, 113, 227, 0.05); }
</style>
