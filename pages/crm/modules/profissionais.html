<div class="module-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
  <div>
    <h2 style="margin: 0; font-size: 1.5rem;">Corpo Clínico</h2>
    <p style="color: var(--text-muted); margin: 0.5rem 0 0 0; font-size: 0.95rem;">Gerencie médicos, psicólogos e demais especialistas independentes da conta de usuário.</p>
  </div>
  
  <button id="btn-novo-profissional" data-permission="profissionais.criar" style="padding: 0.75rem 1.25rem; border-radius: 10px; background: var(--primary-color); color: white; border: none; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; transition: background 0.2s;">
    <i class="fas fa-user-md"></i> Cadastrar Profissional
  </button>
</div>

<!-- Componente Glass Table Padrão -->
<div style="background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border-color); overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.03);">
  
  <!-- Barra de Busca -->
  <div style="padding: 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; gap: 1rem;">
    <div style="position: relative; flex-grow: 1;">
      <i class="fas fa-search" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
      <input type="text" placeholder="Buscar por nome, CRM ou especialidade..." style="width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-input, #f9f9fb); color: var(--text-dark);">
    </div>
    <button style="padding: 0.75rem 1.5rem; border-radius: 8px; background: transparent; border: 1px solid var(--border-color); cursor: pointer; color: var(--text-dark);">
      <i class="fas fa-filter"></i> Filtros
    </button>
  </div>

  <!-- Tabela -->
  <div style="overflow-x: auto;">
    <table style="width: 100%; border-collapse: collapse; text-align: left;">
      <thead style="background: var(--bg-hover, #f0f0f5);">
        <tr>
          <th style="padding: 1rem 1.5rem; font-weight: 500; color: var(--text-muted); font-size: 0.85rem;">PROFISSIONAL</th>
          <th style="padding: 1rem 1.5rem; font-weight: 500; color: var(--text-muted); font-size: 0.85rem;">ESPECIALIDADE</th>
          <th style="padding: 1rem 1.5rem; font-weight: 500; color: var(--text-muted); font-size: 0.85rem;">CONTATO</th>
          <th style="padding: 1rem 1.5rem; font-weight: 500; color: var(--text-muted); font-size: 0.85rem;">STATUS</th>
          <th style="padding: 1rem 1.5rem; font-weight: 500; color: var(--text-muted); font-size: 0.85rem; text-align: right;">AÇÕES</th>
        </tr>
      </thead>
      <tbody id="profissionais-tbody">
        <!-- Renderizado via Controller -->
      </tbody>
    </table>
  </div>
</div>
