<div class="module-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
  <div>
    <h2 style="margin: 0; font-size: 1.5rem;">Aprovação de Consultas</h2>
    <p style="color: var(--text-muted); margin: 0.5rem 0 0 0; font-size: 0.95rem;">Gerencie as solicitações pendentes de pacientes.</p>
  </div>
  
  <div style="display: flex; gap: 1rem;">
    <button class="btn btn-icon" id="btn-refresh" style="padding: 0.75rem; border-radius: 10px; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-dark); cursor: pointer;" title="Atualizar">
      <i class="fas fa-sync-alt"></i>
    </button>
  </div>
</div>

<div class="agenda-toolbar" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
  <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
    <select id="filter-profissional-aprov" style="padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-input); color: var(--text-dark); min-width: 200px;">
      <option value="">Todos os Profissionais</option>
    </select>
    
    <select id="filter-periodo" style="padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-input); color: var(--text-dark); min-width: 150px;">
      <option value="hoje">Hoje</option>
      <option value="amanha">Amanhã</option>
      <option value="semana">Nesta Semana</option>
      <option value="todas" selected>Todas Pendentes</option>
    </select>
  </div>
</div>

<div id="aprovacoes-list" style="display: grid; gap: 1rem;">
  <!-- Renderizado via JS -->
  <div style="text-align: center; padding: 3rem; color: var(--text-muted);">
    <i class="fas fa-spinner fa-spin fa-2x"></i>
    <p style="margin-top: 1rem;">Carregando solicitações...</p>
  </div>
</div>

<!-- Modal de Recusa / Remarcação -->
<div class="modal-overlay" id="modal-motivo">
  <div class="modal-content" style="max-width: 450px;">
    <h3 style="margin-top: 0; display: flex; justify-content: space-between; align-items: center;">
      <span id="modal-motivo-title">Justificar Decisão</span>
      <button class="btn-close-modal" style="background: transparent; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-muted);"><i class="fas fa-times"></i></button>
    </h3>
    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">Por favor, informe o motivo para esta ação. Este dado ficará registrado na auditoria.</p>
    
    <form id="form-motivo" style="display: grid; gap: 1.25rem;">
      <input type="hidden" id="modal-motivo-action" value="">
      <input type="hidden" id="modal-motivo-id" value="">
      
      <div>
        <label style="display: block; font-size: 0.85rem; margin-bottom: 0.4rem; font-weight: 500;">Motivo Obrigatório</label>
        <select id="modal-motivo-select" required style="width: 100%; padding: 0.85rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-input); color: var(--text-dark);">
          <option value="">Selecione um motivo...</option>
          <option value="conflito">Conflito de agenda (Emergência)</option>
          <option value="indisponibilidade">Indisponibilidade temporária</option>
          <option value="ferias">Férias / Folga</option>
          <option value="paciente_duplicado">Agendamento duplicado pelo paciente</option>
          <option value="outro">Outro motivo</option>
        </select>
      </div>
      <div>
        <label style="display: block; font-size: 0.85rem; margin-bottom: 0.4rem; font-weight: 500;">Observações adicionais</label>
        <textarea id="modal-motivo-obs" rows="3" style="width: 100%; padding: 0.85rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-input); color: var(--text-dark); resize: vertical;"></textarea>
      </div>
      <button type="submit" id="btn-submit-motivo" style="padding: 1rem; border-radius: 8px; background: var(--primary-color); color: white; border: none; font-weight: 600; margin-top: 0.5rem; cursor: pointer; transition: background 0.2s;">
        Confirmar Ação
      </button>
    </form>
  </div>
</div>
