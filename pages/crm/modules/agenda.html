<div class="module-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
  <div>
    <h2 style="margin: 0; font-size: 1.5rem;">Agenda Inteligente</h2>
    <p style="color: var(--text-muted); margin: 0.5rem 0 0 0; font-size: 0.95rem;">Controle automático de slots, conflitos e marcações.</p>
  </div>
  
  <div style="display: flex; gap: 1rem;">
    <button class="btn" id="btn-hoje" style="padding: 0.75rem 1rem; border-radius: 10px; background: transparent; border: 1px solid var(--border-color); color: var(--text-dark);">
      Hoje
    </button>
    <div style="display: flex; align-items: center; gap: 0.5rem;">
      <button class="btn btn-icon" id="btn-prev-date" style="padding: 0.5rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-input); color: var(--text-dark); cursor: pointer;"><i class="fas fa-chevron-left"></i></button>
      <span id="current-date-display" style="font-weight: 500; min-width: 150px; text-align: center;"></span>
      <button class="btn btn-icon" id="btn-next-date" style="padding: 0.5rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-input); color: var(--text-dark); cursor: pointer;"><i class="fas fa-chevron-right"></i></button>
    </div>

    <button id="btn-nova-consulta" data-permission="agenda.criar" style="padding: 0.75rem 1.25rem; border-radius: 10px; background: var(--primary-color); color: white; border: none; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; transition: background 0.2s;">
      <i class="fas fa-calendar-plus"></i> Novo Agendamento
    </button>
  </div>
</div>

<div class="agenda-toolbar" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
  <div style="display: flex; gap: 1rem; align-items: center;">
    <select id="filter-profissional" style="padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-input); color: var(--text-dark); min-width: 250px;">
      <option value="">Todos os Profissionais</option>
    </select>
  </div>
  <div class="agenda-views" style="display: flex; gap: 0.5rem; background: var(--bg-input); padding: 0.25rem; border-radius: 10px; border: 1px solid var(--border-color);">
    <button class="view-btn active" data-view="dia" style="padding: 0.5rem 1rem; border-radius: 6px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; font-weight: 500;">Dia</button>
    <button class="view-btn" data-view="semana" style="padding: 0.5rem 1rem; border-radius: 6px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; font-weight: 500;">Semana</button>
    <button class="view-btn" data-view="mes" style="padding: 0.5rem 1rem; border-radius: 6px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; font-weight: 500;">Mês</button>
    <button class="view-btn" data-view="lista" style="padding: 0.5rem 1rem; border-radius: 6px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; font-weight: 500;">Lista</button>
  </div>
</div>

<!-- Grid de Calendário -->
<div class="agenda-container" style="position: relative; border: 1px solid var(--border-color); border-radius: 12px; background: var(--bg-card); overflow: hidden; min-height: 600px;">
  <div class="agenda-grid" id="agenda-grid" style="display: grid; grid-template-columns: 60px 1fr; overflow-y: auto; max-height: 700px;">
    <!-- Gerado via JS Controller -->
  </div>
</div>

<!-- Modal de Novo Agendamento -->
<div class="modal-overlay" id="modal-agendamento">
  <div class="modal-content" style="max-width: 500px;">
    <h3 style="margin-top: 0; display: flex; justify-content: space-between; align-items: center;">
      Novo Agendamento
      <button class="btn-close-modal" style="background: transparent; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-muted);"><i class="fas fa-times"></i></button>
    </h3>
    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">O sistema validará disponibilidade, intervalos e evitará sobreposições.</p>
    
    <form id="form-novo-agendamento" style="display: grid; gap: 1.25rem;">
      <div>
        <label style="display: block; font-size: 0.85rem; margin-bottom: 0.4rem; font-weight: 500;">Paciente</label>
        <select id="modal-paciente" required style="width: 100%; padding: 0.85rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-input); color: var(--text-dark);">
          <option value="">Selecione um paciente...</option>
        </select>
      </div>
      <div>
        <label style="display: block; font-size: 0.85rem; margin-bottom: 0.4rem; font-weight: 500;">Profissional</label>
        <select id="modal-profissional" required style="width: 100%; padding: 0.85rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-input); color: var(--text-dark);">
          <option value="">Selecione o profissional...</option>
        </select>
      </div>
      <div>
        <label style="display: block; font-size: 0.85rem; margin-bottom: 0.4rem; font-weight: 500;">Especialidade</label>
        <select id="modal-especialidade" required disabled style="width: 100%; padding: 0.85rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-input); color: var(--text-dark); opacity: 0.7;">
          <option value="">Selecione primeiro o profissional...</option>
        </select>
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div>
          <label style="display: block; font-size: 0.85rem; margin-bottom: 0.4rem; font-weight: 500;">Data</label>
          <input type="date" id="modal-data" required disabled style="width: 100%; padding: 0.85rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-input); color: var(--text-dark); opacity: 0.7;">
        </div>
        <div>
          <label style="display: block; font-size: 0.85rem; margin-bottom: 0.4rem; font-weight: 500;">Horário (Slot Livre)</label>
          <select id="modal-horario" required disabled style="width: 100%; padding: 0.85rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-input); color: var(--text-dark); opacity: 0.7;">
            <option value="">Aguardando seleção...</option>
          </select>
        </div>
      </div>
      <div>
        <label style="display: block; font-size: 0.85rem; margin-bottom: 0.4rem; font-weight: 500;">Observações</label>
        <textarea id="modal-observacoes" rows="2" style="width: 100%; padding: 0.85rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-input); color: var(--text-dark); resize: vertical;"></textarea>
      </div>
      <button type="submit" id="btn-submit-agendamento" style="padding: 1rem; border-radius: 8px; background: var(--primary-color); color: white; border: none; font-weight: 600; margin-top: 0.5rem; cursor: pointer; transition: background 0.2s;">
        Agendar Consulta (Status: Solicitada)
      </button>
    </form>
  </div>
</div>
