<div class="module-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
  <div>
    <h2 style="margin: 0; font-size: 1.5rem;">Pacientes (Visão 360°)</h2>
    <p style="color: var(--text-muted); margin: 0.5rem 0 0 0; font-size: 0.95rem;">Central de relacionamento, histórico clínico-administrativo e tags.</p>
  </div>
  
  <div style="display: flex; gap: 1rem;">
    <div style="position: relative; min-width: 250px;">
      <i class="fas fa-search" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
      <input type="text" id="search-paciente" placeholder="Buscar CPF, Nome, Telefone..." style="width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-input); color: var(--text-dark);">
    </div>
  </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 3fr; gap: 1.5rem;">
  
  <!-- Sidebar de Resultados / Lista Rápida -->
  <div class="glass-card" style="background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); padding: 1rem; max-height: 75vh; overflow-y: auto;">
    <h4 style="margin-top: 0; color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase;">Resultados Rápidos</h4>
    <div id="lista-pacientes" style="display: flex; flex-direction: column; gap: 0.5rem;">
      <!-- Lista via JS -->
      <p style="text-align:center; color: var(--text-muted); font-size: 0.85rem; padding: 1rem;">Digite para buscar...</p>
    </div>
  </div>

  <!-- Painel 360° -->
  <div class="glass-card" id="painel-360" style="background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); padding: 2rem; display: none; max-height: 75vh; overflow-y: auto;">
    
    <!-- Cabeçalho do Paciente -->
    <div style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border-color); padding-bottom: 1.5rem; margin-bottom: 1.5rem;">
      <div style="display: flex; gap: 1.5rem; align-items: center;">
        <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--primary-color); color: white; display: flex; justify-content: center; align-items: center; font-size: 2rem; font-weight: 700;" id="pac-avatar">
          --
        </div>
        <div>
          <h2 style="margin: 0 0 0.5rem 0;" id="pac-nome">Nome do Paciente</h2>
          <div style="display: flex; gap: 1rem; color: var(--text-muted); font-size: 0.9rem;">
            <span id="pac-telefone"><i class="fab fa-whatsapp"></i> --</span>
            <span id="pac-cpf"><i class="fas fa-id-card"></i> --</span>
            <span id="pac-origem"><i class="fas fa-bullseye"></i> --</span>
          </div>
          <div style="margin-top: 0.5rem; display: flex; gap: 0.5rem;" id="pac-tags">
            <!-- Tags -->
          </div>
        </div>
      </div>
      
      <div style="text-align: right;">
        <div style="color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; margin-bottom: 0.25rem;">Health Score</div>
        <div style="font-size: 2rem; font-weight: 800; color: var(--success-color);" id="pac-score">100</div>
      </div>
    </div>

    <!-- Abas 360 -->
    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem;">
      
      <!-- Linha do Tempo Unificada -->
      <div>
        <h3 style="margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;"><i class="fas fa-history"></i> Linha do Tempo Unificada</h3>
        <div id="pac-timeline" style="margin-top: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; position: relative; padding-left: 1rem; border-left: 2px solid var(--border-color);">
          <!-- Eventos -->
        </div>
      </div>

      <!-- Resumo Financeiro & Obs Internas -->
      <div style="display: flex; flex-direction: column; gap: 1.5rem;">
        
        <div style="background: var(--bg-body); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border-color);">
          <h4 style="margin: 0 0 1rem 0;"><i class="fas fa-chart-line"></i> Resumo (Simulado)</h4>
          <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
            <span style="color: var(--text-muted);">Consultas Totais</span>
            <strong id="kpi-consultas">--</strong>
          </div>
          <div style="display: flex; justify-content: space-between;">
            <span style="color: var(--text-muted);">Total Faturado</span>
            <strong id="kpi-faturado">--</strong>
          </div>
        </div>

        <div style="background: rgba(255, 204, 0, 0.1); padding: 1.5rem; border-radius: 12px; border: 1px solid rgba(255, 204, 0, 0.3);">
          <h4 style="margin: 0 0 1rem 0; color: #b28a00;"><i class="fas fa-sticky-note"></i> Observações Internas</h4>
          <div id="pac-obs-list" style="display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1rem; max-height: 150px; overflow-y: auto;">
          </div>
          <div style="display: flex; gap: 0.5rem;">
            <input type="text" id="input-nova-obs" placeholder="Nova observação privada..." style="flex: 1; padding: 0.5rem; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-dark);">
            <button id="btn-add-obs" style="background: var(--primary-color); color: white; border: none; border-radius: 6px; padding: 0.5rem 1rem; cursor: pointer;"><i class="fas fa-plus"></i></button>
          </div>
        </div>

      </div>

    </div>

  </div>

</div>

<style>
  .paciente-item {
    padding: 0.75rem;
    border-radius: 8px;
    background: var(--bg-body);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }
  .paciente-item:hover {
    border-color: var(--primary-color);
  }
  .paciente-item.active {
    background: rgba(0, 113, 227, 0.1);
    border-color: var(--primary-color);
  }
  .timeline-item {
    position: relative;
  }
  .timeline-item::before {
    content: '';
    position: absolute;
    left: -1.35rem;
    top: 0.2rem;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--primary-color);
    border: 2px solid var(--bg-card);
  }
</style>
