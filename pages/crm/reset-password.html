<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Senha | Clínica Zoe</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/darkmode.css">
  <link rel="stylesheet" href="../../css/crm-login.css">
  <script src="../../js/theme.js"></script>
</head>
<body class="login-body-section">

  <div class="login-container">
    <div class="login-header">
      <i class="fas fa-key"></i>
      <h1>Recuperar Senha</h1>
      <p>Enviaremos um link seguro para seu e-mail</p>
    </div>

    <div id="status-msg" class="alert-error" style="background: #e8f4fd; color: #0071e3; border-color: #b8dbf9; display: none;">
      <i class="fas fa-info-circle"></i> <span id="status-text"></span>
    </div>

    <form id="recover-form">
      <div class="form-group">
        <label for="email">E-mail Cadastrado</label>
        <input type="email" id="email" required placeholder="seu@email.com">
      </div>
      <button type="submit" class="btn-login" id="recover-btn">Enviar Link</button>
    </form>

    <div class="form-footer">
      <a href="login.html"><i class="fas fa-arrow-left"></i> Voltar ao Login</a>
    </div>
  </div>

  <script type="module">
    import { AuthService } from '../../js/auth.service.js';

    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('recover-form');
      const btn = document.getElementById('recover-btn');
      const statusMsg = document.getElementById('status-msg');
      const statusText = document.getElementById('status-text');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
        btn.disabled = true;

        try {
          await AuthService.recoverPassword(email);
          statusMsg.style.display = 'block';
          statusMsg.style.background = '#d4edda';
          statusMsg.style.color = '#155724';
          statusMsg.style.borderColor = '#c3e6cb';
          statusText.textContent = 'Link de redefinição enviado! Verifique sua caixa de entrada.';
          form.reset();
        } catch (error) {
          statusMsg.style.display = 'block';
          statusMsg.style.background = '#fce4e4';
          statusMsg.style.color = '#cc0033';
          statusMsg.style.borderColor = '#fcc2c3';
          statusText.textContent = error.message;
        } finally {
          btn.innerHTML = 'Enviar Link';
          btn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
