<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login CRM | Clínica Zoe</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/darkmode.css">
  <link rel="stylesheet" href="../../css/crm-login.css">
  <script src="../../js/theme.js"></script>
</head>
<body class="login-body-section">

  <div class="login-container">
    <div class="login-header">
      <i class="fas fa-hand-holding-heart"></i>
      <h1>Zoe CRM</h1>
      <p>Acesse seu painel administrativo</p>
    </div>

    <div id="error-msg" class="alert-error">
      <i class="fas fa-exclamation-circle"></i> <span id="error-text">Credenciais inválidas.</span>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">E-mail Profissional</label>
        <input type="email" id="email" required placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="login-btn">Entrar</button>
    </form>

    <div class="form-footer">
      <a href="reset-password.html">Esqueceu sua senha?</a>
      <br><br>
      <a href="../../index.html" style="color: var(--text-muted); font-size: 0.85rem;"><i class="fas fa-arrow-left"></i> Voltar ao site principal</a>
    </div>
  </div>

  <!-- Injeção dos Módulos JS -->
  <script type="module">
    import { AuthService } from '../../js/auth.service.js';
    import { SessionService } from '../../js/session.service.js';

    document.addEventListener('DOMContentLoaded', () => {
      // Se já estiver logado, redireciona
      const session = SessionService.getSession();
      if (session) {
        window.location.href = '/pages/crm/dashboard.html';
        return;
      }

      const form = document.getElementById('login-form');
      const btn = document.getElementById('login-btn');
      const errorMsg = document.getElementById('error-msg');
      const errorText = document.getElementById('error-text');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Autenticando...';
        btn.disabled = true;
        errorMsg.style.display = 'none';

        try {
          await AuthService.login(email, password);
          // O AuthService salva a sessão local em caso de sucesso.
          btn.innerHTML = '<i class="fas fa-check"></i> Redirecionando...';
          btn.style.background = '#28a745';
          setTimeout(() => {
            window.location.href = '/pages/crm/dashboard.html';
          }, 800);
        } catch (error) {
          btn.innerHTML = 'Entrar';
          btn.disabled = false;
          errorText.textContent = error.message;
          errorMsg.style.display = 'block';
          
          // Animação de erro (shake)
          const container = document.querySelector('.login-container');
          container.style.transform = 'translateX(-10px)';
          setTimeout(() => container.style.transform = 'translateX(10px)', 100);
          setTimeout(() => container.style.transform = 'translateX(-10px)', 200);
          setTimeout(() => container.style.transform = 'translateX(0)', 300);
        }
      });
    });
  </script>
</body>
</html>
