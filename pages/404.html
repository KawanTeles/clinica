<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página Não Encontrada | Clínica Zoe</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link rel="stylesheet" href="../css/darkmode.css">
  <link rel="stylesheet" href="../css/animations.css">
  <script src="../js/theme.js"></script>
</head>
<body>

  <header class="header-glass">
    <div class="container nav-container">
      <a href="../index.html" class="logo">
        <i class="fas fa-hand-holding-heart"></i>
        <span>Zoe</span>
      </a>
      <div class="header-actions">
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Alternar tema">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </div>
  </header>

  <section class="section" style="padding-top: 150px; background-color: var(--bg-base); transition: background-color var(--transition-normal); min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center;">
    <div class="container" style="max-width: 500px;">
      <div style="font-size: 6rem; color: var(--primary); margin-bottom: 24px;" class="animate-float">
        <i class="fas fa-exclamation-circle"></i>
      </div>
      <h1 style="font-family: var(--font-title); font-size: 2.8rem; font-weight: 800; margin-bottom: 16px; color: var(--text-main);">Erro 404</h1>
      <p style="color: var(--text-muted); font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px;">Desculpe, a página que você está procurando não existe ou foi movida para outro endereço.</p>
      
      <a href="../index.html" class="btn btn-primary" style="padding: 14px 30px;"><i class="fas fa-home"></i> Voltar para a Página Inicial</a>
    </div>
  </section>

  <script src="../js/notifications.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
