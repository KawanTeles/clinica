<!DOCTYPE html><html lang="pt-BR"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Administrativo | Clínica Zoe</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
  
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link rel="stylesheet" href="../css/darkmode.css">
  <link rel="stylesheet" href="../css/animations.css">
  <script src="../js/theme.js"></script>

  
</head>
<body>

  <div id="loader-overlay" class="loader-overlay">
    <div class="spinner"></div>
    <p>Clínica Zoe</p>
  </div>

  <header class="header-glass">
    <div class="container nav-container">
      <a href="../index.html" class="logo">
        <i class="fas fa-hand-holding-heart"></i>
        <span>Zoe</span>
      </a>
      <div class="header-actions">
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Alternar tema">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </div>
  </header>

  <section class="section login-body-section" style="padding-top: 0; justify-content: center; min-height: 100vh; display: flex; align-items: center;">
    <div class="container" style="display: flex; justify-content: center; align-items: center; width: 100%; height: 100vh;">
      
      <div class="login-container fade-slide-in" style="width: 100%; max-width: 440px; margin: auto; box-sizing: border-box;">
        <div class="login-header">
          <i class="fas fa-hand-holding-heart" style="font-size: 2.5rem; color: var(--primary); margin-bottom: 1rem;"></i>
          <h1>Entrar no Painel</h1>
        </div>

        <!-- Mensagem de erro inline -->
        <div id="login-error" class="login-login-container-div-1" style="display: none;">
          <i class="fas fa-exclamation-circle"></i>
          <span id="login-error-msg"></span>
        </div>

        <form id="login-form">
          <div class="form-group" style="margin-bottom: 1.5rem;">
            <label for="email">E-mail Corporativo</label>
            <input type="email" id="email" class="form-control" placeholder="ex: admin@clinicazoe.com" required="" autocomplete="username">
          </div>
          
          <div class="form-group login-form-div" style="margin-bottom: 2rem;">
            <div class="login-form-group-div" style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
              <label for="password" class="login-login-form-group-div-label" style="margin-bottom: 0;">Senha de Acesso</label>
              <a href="#" id="btn-forgot-password" class="login-login-form-group-div-a">Esqueci minha senha</a>
            </div>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required="" autocomplete="current-password">
          </div>

          <button type="submit" class="btn btn-primary btn-login" style="width: 100%; padding: 12px; font-weight: 600; font-size: 1rem;">
            Entrar no Painel <i class="fas fa-sign-in-alt"></i>
          </button>
        </form>
      </div>

    </div>
  </section>

  <!-- Scripts JS CDNs e arquivos locais -->
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/auth.js"></script>
  



  <script src="../js/login.js"></script>
</body></html>
